# Local development PostgreSQL (same engine as production).
#
#   docker compose up -d
#
# Data directory: database/pgdata/
# Connection:     postgres://hrm:hrm@127.0.0.1:5433/hrm  (see backend/.env)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: hrm
      POSTGRES_USER: hrm
      POSTGRES_PASSWORD: hrm
    volumes:
      - ./database/pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrm -d hrm"]
      interval: 5s
      timeout: 3s
      retries: 10
